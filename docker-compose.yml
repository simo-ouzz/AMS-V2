# =============================================================================
# inventotrackV2 - Docker Compose
# PostgreSQL + Django (Gunicorn) + Nginx
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:17-alpine
    container_name: ams_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: -E UTF8
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ams_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s


  # ---------------------------------------------------------------------------
  # Django Application
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ams_django
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: ams_postgres
      DB_PORT: 5432
      DJANGO_SETTINGS_MODULE: project.settings
      PYTHONUNBUFFERED: "1"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    networks:
      - ams_network


  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: ams_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
    networks:
      - ams_network


# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  ams_network:
    driver: bridge


# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
  static_volume:
  media_volume:
